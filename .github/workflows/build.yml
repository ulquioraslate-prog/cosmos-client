name: Build Cosmos Client
on:
  push:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew build --no-daemon
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: cosmos-client-jar
          path: build/libs/*.jar
